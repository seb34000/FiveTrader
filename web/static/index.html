<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FiveTrader</title>
<script src="/chart.min.js"></script>
<style>
:root{--bg:#0d1117;--bg2:#161b22;--bg3:#1c2128;--border:#30363d;--text:#e6edf3;--text2:#8b949e;--green:#3fb950;--red:#f85149;--yellow:#d29922;--blue:#58a6ff;--purple:#bc8cff;--orange:#ffa657;--cyan:#39d5d3}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'SF Mono','Fira Code','Consolas',monospace;font-size:13px;line-height:1.5;padding:12px}
#header{display:flex;align-items:center;gap:12px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;margin-bottom:12px;flex-wrap:wrap}
.hbadge{background:var(--bg3);border:1px solid var(--border);border-radius:4px;padding:3px 10px;font-size:12px;color:var(--text2)}
.hbadge span{color:var(--text);font-weight:bold}
#ws-status{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);margin-left:auto}
.dot{width:8px;height:8px;border-radius:50%;background:var(--red);flex-shrink:0}
.dot.connected{background:var(--green)}
#global-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.gstat{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;text-align:center}
.gstat .gl{font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em}
.gstat .gv{font-size:20px;font-weight:bold;margin-top:3px}
#tabs{display:flex;gap:4px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:6px 16px;border:1px solid var(--border);border-radius:6px;cursor:pointer;font-size:12px;font-weight:bold;color:var(--text2);background:var(--bg2);transition:all .15s;user-select:none}
.tab:hover{border-color:var(--blue);color:var(--text)}
.tab.active{background:var(--blue);border-color:var(--blue);color:#fff}
.tab.tab-global.active{background:var(--purple);border-color:var(--purple)}
.tab .tab-price{font-weight:normal;font-size:11px;display:block;color:inherit;opacity:.85}
.asset-panel{display:none}
.asset-panel.active{display:block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:12px}
.grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin-bottom:12px}
@media(max-width:1100px){.grid5{grid-template-columns:repeat(3,1fr)}}
@media(max-width:900px){.grid2,.grid3{grid-template-columns:1fr}.grid5{grid-template-columns:1fr 1fr}}
@media(max-width:600px){#global-stats{grid-template-columns:1fr 1fr}.grid5{grid-template-columns:1fr}}
.panel{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px 16px;margin-bottom:12px}
.ptitle{font-size:11px;font-weight:bold;text-transform:uppercase;letter-spacing:.08em;color:var(--text2);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.chart-h200{position:relative;height:200px}
.chart-h160{position:relative;height:160px}
.mgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.mcell{background:var(--bg3);border:1px solid var(--border);border-radius:6px;padding:8px 10px;text-align:center}
.mcell .ml{font-size:10px;color:var(--text2);text-transform:uppercase}
.mcell .mv{font-size:18px;font-weight:bold;margin-top:2px}
.mv.up{color:var(--green)}.mv.down{color:var(--red)}
.countdown{text-align:center;margin-bottom:12px}
.cnum{font-size:36px;font-weight:bold;font-variant-numeric:tabular-nums}
.cnum.green{color:var(--green)}.cnum.yellow{color:var(--yellow)}.cnum.red{color:var(--red)}
.clabel{font-size:11px;color:var(--text2)}
.sstatus{font-size:11px;padding:2px 8px;border-radius:3px;font-weight:bold}
.sstatus.firing{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.4)}
.sstatus.waiting{background:rgba(139,148,158,.1);color:var(--text2);border:1px solid var(--border)}
.sstatus.arb{background:rgba(188,140,255,.15);color:var(--purple);border:1px solid rgba(188,140,255,.4)}
.sdesc{font-size:11px;color:var(--text2);line-height:1.6;margin-bottom:10px;padding:8px;background:var(--bg3);border-radius:4px;border-left:2px solid var(--border)}
.lagmeter{margin:8px 0;text-align:center}
.lagval{font-size:28px;font-weight:bold;font-variant-numeric:tabular-nums}
.pbar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-top:6px}
.pfill{height:100%;border-radius:3px;transition:width .3s}
.kv{width:100%;border-collapse:collapse}
.kv tr{border-bottom:1px solid var(--border)}
.kv tr:last-child{border-bottom:none}
.kv td{padding:4px 0}
.kv td:first-child{color:var(--text2);font-size:11px;padding-right:8px}
.kv td:last-child{text-align:right;font-weight:bold;font-size:12px}
table.trades{width:100%;border-collapse:collapse;font-size:12px}
table.trades th{text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:4px 6px;border-bottom:1px solid var(--border)}
table.trades td{padding:5px 6px;border-bottom:1px solid rgba(48,54,61,.5)}
table.trades tr:last-child td{border-bottom:none}
.bs{font-size:10px;padding:1px 6px;border-radius:3px;font-weight:bold}
.bs-oracle_lag{background:rgba(88,166,255,.15);color:var(--blue)}
.bs-window_delta{background:rgba(61,213,211,.15);color:var(--cyan)}
.bs-dump_hedge{background:rgba(188,140,255,.15);color:var(--purple)}
.dir-up{color:var(--green);font-weight:bold}.dir-down{color:var(--red);font-weight:bold}.dir-both{color:var(--purple);font-weight:bold}
.pp{color:var(--green)}.pn{color:var(--red)}.pz{color:var(--text2)}
.green{color:var(--green)}.red{color:var(--red)}.yellow{color:var(--yellow)}.blue{color:var(--blue)}.purple{color:var(--purple)}.dim{color:var(--text2)}
.ocbadge{font-size:10px;padding:1px 6px;border-radius:3px;background:var(--bg3);color:var(--text2);border:1px solid var(--border)}
.ssep{margin:12px 0 4px;font-size:11px;color:var(--text2);text-transform:uppercase;letter-spacing:.08em}
/* global tab */
.acard{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:14px}
.acard-hd{display:flex;align-items:baseline;gap:8px;margin-bottom:8px}
.acard-price{font-size:22px;font-weight:bold;font-variant-numeric:tabular-nums;margin-bottom:8px}
.acard-row{display:flex;justify-content:space-between;font-size:11px;padding:3px 0;border-bottom:1px solid var(--border)}
.acard-row:last-child{border-bottom:none}
.acard-lbl{color:var(--text2)}
table.ov{width:100%;border-collapse:collapse;font-size:12px}
table.ov th{text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;padding:6px 8px;border-bottom:1px solid var(--border);white-space:nowrap}
table.ov td{padding:7px 8px;border-bottom:1px solid rgba(48,54,61,.5);white-space:nowrap}
table.ov tr:last-child td{border-bottom:none}
</style>
</head>
<body>

<div id="header">
  <div class="hbadge">Mode <span id="h-mode">—</span></div>
  <div class="hbadge">Wallet <span id="h-addr">—</span></div>
  <div id="ws-status"><div class="dot" id="ws-dot"></div><span id="ws-label">Connecting…</span></div>
</div>

<div id="global-stats">
  <div class="gstat"><div class="gl">Total P&amp;L</div><div class="gv" id="g-pnl">$0.00</div></div>
  <div class="gstat"><div class="gl">Settled Trades</div><div class="gv blue" id="g-trades">0</div></div>
  <div class="gstat"><div class="gl">Win Rate</div><div class="gv" id="g-wr">—</div></div>
  <div class="gstat"><div class="gl">Daily Loss</div><div class="gv" id="g-dloss">$0.00</div></div>
</div>

<div id="tabs">
  <div class="tab tab-global active" data-sym="global" onclick="switchTab('global')">&#9670; ALL</div>
  <div class="tab" data-sym="btc" onclick="switchTab('btc')">&#8383; BTC <span class="tab-price" id="tab-price-btc">—</span></div>
  <div class="tab" data-sym="eth" onclick="switchTab('eth')">&Xi; ETH <span class="tab-price" id="tab-price-eth">—</span></div>
  <div class="tab" data-sym="xrp" onclick="switchTab('xrp')">&#10005; XRP <span class="tab-price" id="tab-price-xrp">—</span></div>
</div>

<div id="panels"></div>

<script>
// ─── constants ───────────────────────────────────────────────────────────────
const ASSETS = ['btc','eth','xrp'];
const ANAME  = {btc:'Bitcoin',eth:'Ethereum',xrp:'XRP'};
const AICON  = {btc:'&#8383;',eth:'&Xi;',xrp:'&#10005;'};
const ACOLOR = {btc:'#d29922',eth:'#58a6ff',xrp:'#39d5d3'};
const AFILL  = {btc:'rgba(210,153,34,.08)',eth:'rgba(88,166,255,.08)',xrp:'rgba(57,213,211,.08)'};
const HAS_BS = {btc:true,eth:true,xrp:true};
const MAX_PTS = 300;

let state = null, activeTab = 'global';
const chartData = {}, charts = {}, pnlData = {}, pnlCharts = {};
const combLabels = [], combSeries = {};

// ─── helpers ─────────────────────────────────────────────────────────────────
const $       = id => document.getElementById(id);
const fmtP    = n  => n > 0 ? '$'+n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:4}) : '—';
const fmtPct  = n  => (n>=0?'+':'')+n.toFixed(3)+'%';
const fmtAge  = s  => s<60 ? s.toFixed(0)+'s' : (s/60).toFixed(1)+'m';
const fmtUSD  = n  => (n>=0?'+':'-')+'$'+Math.abs(n||0).toFixed(2);
const tstr    = t  => new Date(t).toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
const dtstr   = t  => { const d=new Date(t); return d.toLocaleDateString('en-US',{month:'2-digit',day:'2-digit'})+' '+tstr(t); };
const pushTrim= (a,v)=>{ a.push(v); if(a.length>MAX_PTS) a.shift(); };
const pnlCls  = v  => v>0?'pp':v<0?'pn':'pz';
const dirCls  = d  => { if(!d) return ''; const u=d.toUpperCase(); return u==='UP'?'dir-up':u==='DOWN'?'dir-down':'dir-both'; };
const elapsed = ts => { const s=Math.floor((Date.now()-new Date(ts).getTime())/1000); return s<60?s+'s':Math.floor(s/60)+'m'+(s%60)+'s'; };
function setStatus(id,label,cls){ const el=$(id); if(!el) return; el.textContent=label; el.className='sstatus '+cls; }

// ─── build DOM ───────────────────────────────────────────────────────────────
Chart.defaults.color='#8b949e'; Chart.defaults.borderColor='#30363d';
Chart.defaults.font.family="'SF Mono','Fira Code','Consolas',monospace"; Chart.defaults.font.size=11;

function buildPanels(){
  const c = $('panels');

  // global panel
  let ghtml = '<div class="asset-panel active" id="panel-global">';
  ghtml += '<div class="grid3">';
  ASSETS.forEach(sym => {
    ghtml += `<div class="acard" id="gcard-${sym}">
      <div class="acard-hd"><span style="font-size:18px;color:${ACOLOR[sym]}">${ANAME[sym]}</span></div>
      <div class="acard-price dim" id="gc-price-${sym}">—</div>
      <div class="acard-row"><span class="acard-lbl">Oracle &Delta;</span><span id="gc-od-${sym}" class="dim">—</span></div>
      <div class="acard-row"><span class="acard-lbl">Window</span><span id="gc-win-${sym}" class="dim">—</span></div>
      <div class="acard-row"><span class="acard-lbl">Ask UP/DN</span><span id="gc-asks-${sym}" class="dim">—</span></div>
      <div class="acard-row"><span class="acard-lbl">P&amp;L</span><span id="gc-pnl-${sym}" class="dim">—</span></div>
      <div class="acard-row"><span class="acard-lbl">Trades / WR</span><span id="gc-tr-${sym}" class="dim">—</span></div>
      <div class="acard-row"><span class="acard-lbl">Open</span><span id="gc-op-${sym}">0</span></div>
      <div style="margin-top:8px;font-size:10px;color:var(--text2);background:var(--bg3);border-radius:3px;padding:4px 6px;min-height:20px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" id="gc-sig-${sym}">—</div>
    </div>`;
  });
  ghtml += '</div>';
  ghtml += '<div class="panel"><div class="ptitle"><span class="purple">&#9670;</span> Combined Cumulative P&amp;L (USDC)</div><div class="chart-h200"><canvas id="chart-combined-pnl"></canvas></div></div>';
  ghtml += '<div class="panel"><div class="ptitle">Market Overview</div>';
  ghtml += '<table class="ov"><thead><tr><th>Asset</th><th>Price</th><th>Binance</th><th>Coinbase</th><th>Oracle</th><th>Oracle &Delta;</th><th>Window</th><th>Ask UP</th><th>Ask DN</th><th>P&amp;L</th><th>Trades</th><th>WR</th><th>Open</th></tr></thead><tbody id="ov-tbody"></tbody></table></div>';
  ghtml += '<div class="panel"><div class="ptitle">Recent Trades — All Assets <span class="ocbadge" id="ov-hist-count">0</span></div>';
  ghtml += '<table class="trades"><thead><tr><th>Asset</th><th>Strategy</th><th>Dir</th><th>Price</th><th>Staked</th><th>P&amp;L</th><th>Entry</th><th>Window end</th></tr></thead><tbody id="ov-hist-tbody"></tbody></table></div>';
  ghtml += '</div>';

  // per-asset panels
  let ahtml = '';
  ASSETS.forEach(sym => {
    ahtml += `<div class="asset-panel" id="panel-${sym}">
    <div class="grid2">
      <div class="panel">
        <div class="ptitle"><span class="blue">&#9673;</span> ${ANAME[sym]} Price</div>
        <div class="chart-h200"><canvas id="chart-price-${sym}"></canvas></div>
      </div>
      <div class="panel">
        <div class="ptitle">P&amp;L Cumulatif — ${sym.toUpperCase()}</div>
        <div class="chart-h160"><canvas id="chart-pnl-${sym}"></canvas></div>
        <div class="ssep">Last signal</div>
        <div id="sig-${sym}" style="font-size:11px;color:var(--text2);padding:6px 10px;background:var(--bg3);border-radius:4px;border-left:2px solid var(--blue);min-height:28px;margin-top:4px">No signal yet</div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ptitle">Polymarket — fenetre actuelle</div>
      <div class="grid2">
        <div>
          <div class="countdown"><div class="cnum green" id="cdown-${sym}">—:——</div><div class="clabel">avant fermeture</div></div>
          <div class="mgrid">
            <div class="mcell"><div class="ml">Ask UP</div><div class="mv up" id="ask-up-${sym}">—</div></div>
            <div class="mcell"><div class="ml">Ask DOWN</div><div class="mv down" id="ask-dn-${sym}">—</div></div>
          </div>
        </div>
        <div class="mgrid" style="align-content:start">
          <div class="mcell"><div class="ml">Window Open</div><div class="mv blue" id="win-open-${sym}">—</div></div>
          <div class="mcell"><div class="ml">Price Delta</div><div class="mv" id="win-delta-${sym}">—</div></div>
          <div class="mcell"><div class="ml">Oracle Price</div><div class="mv" style="color:var(--orange)" id="oracle-px-${sym}">—</div></div>
          <div class="mcell"><div class="ml">Oracle Age</div><div class="mv dim" id="oracle-age-${sym}">—</div></div>
        </div>
      </div>
    </div>
    <div class="grid3">
      <div class="panel">
        <div class="ptitle"><span class="blue">&#9889;</span> Oracle Lag <span class="sstatus waiting" id="ol-st-${sym}">WAITING</span></div>
        <div class="sdesc">Prix live vs Chainlink. Delta &gt;0.3% avant update oracle = marche mal price.</div>
        <div class="lagmeter">
          <div class="lagval dim" id="ol-delta-${sym}">0.000%</div>
          <div class="dim" style="font-size:11px">seuil ±0.30%</div>
          <div class="pbar"><div class="pfill" id="ol-bar-${sym}" style="width:0%;background:var(--blue)"></div></div>
        </div>
        <table class="kv">
          <tr><td>Live</td><td id="ol-live-${sym}">—</td></tr>
          <tr><td>Oracle</td><td id="ol-oracle-${sym}">—</td></tr>
          <tr><td>Age</td><td id="ol-age-${sym}">—</td></tr>
          <tr><td>Win prob</td><td id="ol-wp-${sym}">—</td></tr>
          <tr><td>Edge</td><td id="ol-edge-${sym}">—</td></tr>
        </table>
      </div>
      <div class="panel">
        <div class="ptitle"><span class="cyan">&#128202;</span> Window Delta <span class="sstatus waiting" id="wd-st-${sym}">WAITING</span></div>
        <div class="sdesc">A T-60s la direction est quasi-lockee. Parier sur le cote gagnant si token sous-price.</div>
        <div class="lagmeter">
          <div class="lagval dim" id="wd-delta-${sym}">0.000%</div>
          <div class="dim" style="font-size:11px">delta fenetre (open → now)</div>
          <div class="pbar"><div class="pfill" id="wd-bar-${sym}" style="width:0%;background:var(--cyan)"></div></div>
        </div>
        <table class="kv">
          <tr><td>Open</td><td id="wd-open-${sym}">—</td></tr>
          <tr><td>Elapsed</td><td id="wd-el-${sym}">—</td></tr>
          <tr><td>Remaining</td><td id="wd-rem-${sym}">—</td></tr>
          <tr><td>Zone</td><td id="wd-zone-${sym}">—</td></tr>
          <tr><td>Win prob</td><td id="wd-wp-${sym}">—</td></tr>
          <tr><td>Edge</td><td id="wd-edge-${sym}">—</td></tr>
        </table>
      </div>
      <div class="panel">
        <div class="ptitle"><span class="purple">&#128256;</span> Dump &amp; Hedge <span class="sstatus waiting" id="dh-st-${sym}">INACTIVE</span></div>
        <div class="sdesc">Si ask(UP) + ask(DOWN) &lt; $0.98, acheter les deux = profit garanti.</div>
        <div class="lagmeter">
          <div class="lagval dim" id="dh-sum-${sym}">—</div>
          <div class="dim" style="font-size:11px">seuil &lt; $0.98</div>
          <div class="pbar"><div class="pfill" id="dh-bar-${sym}" style="width:100%;background:var(--green)"></div></div>
        </div>
        <table class="kv">
          <tr><td>Ask UP</td><td id="dh-up-${sym}">—</td></tr>
          <tr><td>Ask DOWN</td><td id="dh-dn-${sym}">—</td></tr>
          <tr><td>Sum</td><td id="dh-sum2-${sym}">—</td></tr>
          <tr><td>Profit</td><td id="dh-pr-${sym}">—</td></tr>
        </table>
      </div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ptitle">Price Feeds</div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr;gap:8px">
        <div><div class="dim" style="font-size:11px">&#128993; Binance</div><div class="blue" style="font-size:14px;font-weight:bold;margin-top:4px" id="fd-bn-${sym}">—</div></div>
        <div><div class="dim" style="font-size:11px">&#128309; Bitstamp</div><div class="cyan" style="font-size:14px;font-weight:bold;margin-top:4px" id="fd-bs-${sym}">${HAS_BS[sym]?'—':'N/A'}</div></div>
        <div><div class="dim" style="font-size:11px">&#128311; Coinbase</div><div class="purple" style="font-size:14px;font-weight:bold;margin-top:4px" id="fd-cb-${sym}">—</div></div>
        <div><div class="dim" style="font-size:11px">&#128312; Chainlink</div><div style="font-size:14px;font-weight:bold;margin-top:4px;color:var(--orange)" id="fd-cl-${sym}">—</div></div>
        <div><div class="dim" style="font-size:11px">Agrege</div><div style="font-size:16px;font-weight:bold;margin-top:4px" id="fd-ag-${sym}">—</div></div>
      </div>
    </div>
    <div class="panel" style="margin-bottom:12px">
      <div class="ptitle">Open Trades <span class="ocbadge" id="oc-${sym}">0</span></div>
      <table class="trades"><thead><tr><th>ID</th><th>Strategy</th><th>Dir</th><th>Price</th><th>Staked</th><th>Age</th><th>Window end</th></tr></thead>
      <tbody id="tb-open-${sym}"></tbody></table>
    </div>
    <div class="panel">
      <div class="ptitle">Trade History <span class="ocbadge" id="hc-${sym}">0</span></div>
      <table class="trades"><thead><tr><th>Strategy</th><th>Dir</th><th>Price</th><th>Staked</th><th>P&amp;L</th><th>Entry</th><th>Window end</th></tr></thead>
      <tbody id="tb-hist-${sym}"></tbody></table>
    </div>
    </div>`;
  });

  c.innerHTML = ghtml + ahtml;
}

// ─── charts ──────────────────────────────────────────────────────────────────
function initCharts(){
  ASSETS.forEach(sym => {
    chartData[sym] = {labels:[],bn:[],bs:[],cb:[],cl:[]};
    pnlData[sym]   = {labels:[],vals:[]};
    combSeries[sym] = [];

    charts[sym] = new Chart($('chart-price-'+sym), {
      type:'line',
      data:{labels:chartData[sym].labels,datasets:[
        {label:'Binance', data:chartData[sym].bn, borderColor:'#58a6ff',borderWidth:1.5,pointRadius:0,tension:0.3},
        {label:'Bitstamp',data:chartData[sym].bs, borderColor:'#39d5d3',borderWidth:1.5,pointRadius:0,tension:0.3},
        {label:'Coinbase',data:chartData[sym].cb, borderColor:'#bc8cff',borderWidth:1.5,pointRadius:0,tension:0.3},
        {label:'Oracle',  data:chartData[sym].cl, borderColor:'#ffa657',borderWidth:1.5,pointRadius:0,borderDash:[4,3],tension:0},
      ]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        interaction:{mode:'index',intersect:false},
        scales:{x:{ticks:{maxTicksLimit:6,maxRotation:0},grid:{color:'#1c2128'}},
                y:{ticks:{callback:v=>'$'+v.toLocaleString('en-US',{maximumFractionDigits:2})},grid:{color:'#1c2128'}}},
        plugins:{legend:{position:'top',labels:{boxWidth:12}}}}
    });

    pnlCharts[sym] = new Chart($('chart-pnl-'+sym), {
      type:'line',
      data:{labels:pnlData[sym].labels,datasets:[{
        label:'P&L',data:pnlData[sym].vals,
        borderColor:ACOLOR[sym],backgroundColor:AFILL[sym],
        fill:true,borderWidth:2,pointRadius:0,tension:0.3
      }]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        scales:{x:{ticks:{maxTicksLimit:4,maxRotation:0},grid:{color:'#1c2128'}},
                y:{ticks:{callback:v=>'$'+v.toFixed(2)},grid:{color:'#1c2128'}}},
        plugins:{legend:{display:false}}}
    });
  });

  // combined P&L chart
  new Chart($('chart-combined-pnl'), {
    type:'line',
    data:{labels:combLabels,datasets:ASSETS.map(sym=>({
      label:sym.toUpperCase(),data:combSeries[sym],
      borderColor:ACOLOR[sym],borderWidth:2,pointRadius:0,tension:0.3,fill:false
    }))},
    options:{responsive:true,maintainAspectRatio:false,animation:false,
      interaction:{mode:'index',intersect:false},
      scales:{x:{ticks:{maxTicksLimit:6,maxRotation:0},grid:{color:'#1c2128'}},
              y:{ticks:{callback:v=>'$'+v.toFixed(2)},grid:{color:'#1c2128'}}},
      plugins:{legend:{position:'top',labels:{boxWidth:12}}}}
  });
}

// ─── tab switching ────────────────────────────────────────────────────────────
function switchTab(sym){
  activeTab=sym;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.sym===sym));
  document.querySelectorAll('.asset-panel').forEach(p=>p.classList.toggle('active',p.id==='panel-'+sym));
}

// ─── countdown (runs every 250ms) ────────────────────────────────────────────
setInterval(()=>{
  if(!state||!state.assets) return;
  ASSETS.forEach(sym=>{
    const a=state.assets[sym]; if(!a) return;
    const rem=Math.max(0,Math.floor((new Date(a.window_end).getTime()-Date.now())/1000));
    const el=$('cdown-'+sym);
    if(el){ el.textContent=Math.floor(rem/60)+':'+(rem%60<10?'0':'')+(rem%60); el.className='cnum '+(rem>60?'green':rem>30?'yellow':'red'); }
    const gcw=$('gc-win-'+sym);
    if(gcw){ gcw.textContent=Math.floor(rem/60)+':'+(rem%60<10?'0':'')+(rem%60); gcw.className=rem>60?'green':rem>30?'yellow':'red'; }
  });
},250);

// ─── apply update ─────────────────────────────────────────────────────────────
function applyUpdate(u){
  state=u;
  $('h-mode').textContent=u.mode||'—';
  $('h-addr').textContent=u.address?u.address.slice(0,6)+'…'+u.address.slice(-4):'—';

  const gpnl=$('g-pnl');
  gpnl.textContent=fmtUSD(u.total_pnl||0); gpnl.className='gv '+(u.total_pnl>0?'green':u.total_pnl<0?'red':'dim');
  $('g-trades').textContent=u.total_trades||0;
  const gwr=$('g-wr');
  if(u.total_trades>0){gwr.textContent=(u.total_win_rate*100).toFixed(1)+'%';gwr.className='gv '+(u.total_win_rate>=.55?'green':'red');}
  else{gwr.textContent='—';gwr.className='gv dim';}
  $('g-dloss').textContent='$'+(u.total_daily_loss||0).toFixed(2);

  if(!u.assets) return;
  const label=tstr(u.server_time);
  pushTrim(combLabels,label);

  const ovRows=[], histAllRows=[];

  ASSETS.forEach(sym=>{
    const a=u.assets[sym];
    pushTrim(combSeries[sym], a?(a.pnl||0):null);
    if(!a) return;

    // tab price
    const tp=$('tab-price-'+sym); if(tp) tp.textContent=a.live_price>0?fmtP(a.live_price):'—';

    // price chart
    pushTrim(chartData[sym].labels,label);
    pushTrim(chartData[sym].bn, a.price_binance>0?a.price_binance:null);
    pushTrim(chartData[sym].bs, a.price_bitstamp>0?a.price_bitstamp:null);
    pushTrim(chartData[sym].cb, a.price_coinbase>0?a.price_coinbase:null);
    pushTrim(chartData[sym].cl, a.oracle_price>0?a.oracle_price:null);
    if(sym===activeTab) charts[sym].update('none');

    // P&L chart (every tick)
    pushTrim(pnlData[sym].labels,label);
    pushTrim(pnlData[sym].vals, parseFloat((a.pnl||0).toFixed(4)));
    if(sym===activeTab) pnlCharts[sym].update('none');

    // global card
    const setEl=(id,v)=>{const e=$(id);if(e)e.textContent=v;};
    const setElCls=(id,v,c)=>{const e=$(id);if(!e)return;e.textContent=v;e.className=c;};
    setElCls('gc-price-'+sym, a.live_price>0?fmtP(a.live_price):'—', a.live_price>0?'acard-price':'acard-price dim');
    const od=a.oracle_delta||0;
    setElCls('gc-od-'+sym, fmtPct(od), Math.abs(od)>=.3?(od>0?'green':'red'):'dim');
    setEl('gc-asks-'+sym, a.ask_up>0&&a.ask_down>0?'$'+a.ask_up.toFixed(3)+' / $'+a.ask_down.toFixed(3):'—');
    setElCls('gc-pnl-'+sym, fmtUSD(a.pnl||0), pnlCls(a.pnl||0));
    setEl('gc-tr-'+sym, (a.settled_trades||0)+(a.settled_trades>0?' / '+(a.win_rate*100).toFixed(1)+'%':''));
    setEl('gc-op-'+sym, a.open_trades?a.open_trades.length:0);
    if(a.last_signal) setEl('gc-sig-'+sym, a.last_signal);

    // overview table row
    const rem=Math.max(0,Math.floor((new Date(a.window_end).getTime()-Date.now())/1000));
    const rcls=rem>60?'green':rem>30?'yellow':'red';
    ovRows.push(`<tr>
      <td style="font-weight:bold;color:${ACOLOR[sym]}">${sym.toUpperCase()}</td>
      <td>${a.live_price>0?fmtP(a.live_price):'—'}</td>
      <td class="blue">${a.price_binance>0?fmtP(a.price_binance):'—'}</td>
      <td class="purple">${a.price_coinbase>0?fmtP(a.price_coinbase):'—'}</td>
      <td style="color:var(--orange)">${a.oracle_price>0?fmtP(a.oracle_price):'—'}</td>
      <td class="${Math.abs(od)>=.3?(od>0?'green':'red'):'dim'}">${fmtPct(od)}</td>
      <td class="${rcls}">${Math.floor(rem/60)}:${(rem%60<10?'0':'')+(rem%60)}</td>
      <td class="up">${a.ask_up>0?'$'+a.ask_up.toFixed(3):'—'}</td>
      <td class="down">${a.ask_down>0?'$'+a.ask_down.toFixed(3):'—'}</td>
      <td class="${pnlCls(a.pnl||0)}">${fmtUSD(a.pnl||0)}</td>
      <td>${a.settled_trades||0}</td>
      <td>${a.settled_trades>0?(a.win_rate*100).toFixed(1)+'%':'—'}</td>
      <td>${a.open_trades?a.open_trades.length:0}</td>
    </tr>`);

    // global history (collect all assets)
    if(a.recent_trades&&a.recent_trades.length>0){
      a.recent_trades.forEach(t=>{
        const pc=t.pnl>0?'pp':t.pnl<0?'pn':'pz';
        histAllRows.push({ts:new Date(t.timestamp).getTime(), html:`<tr>
          <td style="font-weight:bold;color:${ACOLOR[sym]}">${sym.toUpperCase()}</td>
          <td><span class="bs bs-${t.strategy}">${t.strategy}</span></td>
          <td class="${dirCls(t.direction)}">${t.direction.toUpperCase()}</td>
          <td>$${t.token_price.toFixed(3)}</td>
          <td>$${t.usdc_staked.toFixed(2)}</td>
          <td class="${pc}">${fmtUSD(t.pnl)}</td>
          <td class="dim">${dtstr(t.timestamp)}</td>
          <td class="dim">${tstr(t.window_end)}</td>
        </tr>`});
      });
    }

    // ── skip per-asset DOM if panel not visible (no element check needed — all built) ──
    const e=id=>$(id+'-'+sym);

    e('ask-up').textContent  = a.ask_up>0?'$'+a.ask_up.toFixed(3):'—';
    e('ask-dn').textContent  = a.ask_down>0?'$'+a.ask_down.toFixed(3):'—';
    e('win-open').textContent= a.window_open>0?fmtP(a.window_open):'—';
    e('oracle-px').textContent= a.oracle_price>0?fmtP(a.oracle_price):'—';
    e('oracle-age').textContent= a.oracle_age_sec>0?fmtAge(a.oracle_age_sec)+' ago':'—';
    if(a.live_price>0&&a.window_open>0){
      const wd=(a.live_price-a.window_open)/a.window_open*100;
      const we=e('win-delta'); we.textContent=fmtPct(wd); we.className='mv '+(wd>0?'up':wd<0?'down':'');
    }

    // feeds
    e('fd-bn').textContent = a.price_binance>0?fmtP(a.price_binance):'—';
    if(HAS_BS[sym]) e('fd-bs').textContent = a.price_bitstamp>0?fmtP(a.price_bitstamp):'—';
    e('fd-cb').textContent = a.price_coinbase>0?fmtP(a.price_coinbase):'—';
    e('fd-cl').textContent = a.oracle_price>0?fmtP(a.oracle_price):'—';
    e('fd-ag').textContent = a.live_price>0?fmtP(a.live_price):'—';

    // signal
    if(a.last_signal){ const ls=e('sig'); if(ls) ls.textContent=a.last_signal; }

    // oracle lag
    const olD=Math.abs(a.oracle_delta||0);
    const olFire=olD>=.30&&a.oracle_age_sec>=3&&a.oracle_age_sec<=120;
    const olEl=e('ol-delta'); if(olEl){olEl.textContent=fmtPct(a.oracle_delta||0);olEl.className='lagval '+(olFire?(od>0?'green':'red'):'dim');}
    setStatus('ol-st-'+sym,olFire?'FIRING':'WAITING',olFire?'firing':'waiting');
    const olB=e('ol-bar'); if(olB){olB.style.width=Math.min(100,olD)*100+'%';olB.style.background=olFire?(od>0?'var(--green)':'var(--red)'):'var(--blue)';}
    e('ol-live').textContent  = a.live_price>0?fmtP(a.live_price):'—';
    e('ol-oracle').textContent= a.oracle_price>0?fmtP(a.oracle_price):'—';
    e('ol-age').textContent   = a.oracle_age_sec>0?fmtAge(a.oracle_age_sec):'—';
    if(olFire){
      const delta=olD/100, winP=Math.min(.92,.72+delta*40);
      const askS=(a.oracle_delta||0)>0?a.ask_up:a.ask_down;
      const edge=askS>0?winP-askS:0;
      const wpe=e('ol-wp'); if(wpe){wpe.textContent=(winP*100).toFixed(1)+'%';wpe.className=winP>.6?'green':'yellow';}
      const ee=e('ol-edge'); if(ee){ee.textContent=edge>0?'+'+(edge*100).toFixed(1)+'%':'—';ee.className=edge>.04?'green':'yellow';}
    } else {
      const wpe=e('ol-wp'); if(wpe){wpe.textContent='—';wpe.className='';}
      const ee=e('ol-edge'); if(ee){ee.textContent='—';ee.className='';}
    }

    // window delta
    const wEnd=new Date(a.window_end).getTime(), wSt=new Date(a.window_start).getTime();
    const secEl=(Date.now()-wSt)/1000, secRem=Math.max(0,(wEnd-Date.now())/1000);
    const inZone=secRem<=60&&secRem>=8;
    let wdD=0; if(a.live_price>0&&a.window_open>0) wdD=(a.live_price-a.window_open)/a.window_open*100;
    const wdA=Math.abs(wdD);
    let wdWP=.5; if(wdA>=.15)wdWP=.92;else if(wdA>=.10)wdWP=.80;else if(wdA>=.05)wdWP=.65;else if(wdA>=.02)wdWP=.55;
    const wdAS=wdD>0?a.ask_up:a.ask_down, wdEdge=wdAS>0?wdWP-wdAS:0;
    const wdFire=inZone&&wdA>=.001&&wdAS<.78;
    const wdEl=e('wd-delta'); if(wdEl){wdEl.textContent=fmtPct(wdD);wdEl.className='lagval '+(wdD>0?'green':wdD<0?'red':'dim');}
    const wdB=e('wd-bar'); if(wdB) wdB.style.width=Math.min(100,wdA/.2*100)+'%';
    setStatus('wd-st-'+sym,wdFire?'FIRING':inZone?'IN ZONE':'WAITING',wdFire?'firing':'waiting');
    e('wd-open').textContent = a.window_open>0?fmtP(a.window_open):'—';
    e('wd-el').textContent   = secEl>0?fmtAge(secEl):'—';
    e('wd-rem').textContent  = secRem>0?fmtAge(secRem):'—';
    const ze=e('wd-zone'); ze.textContent=secRem>60?'Too early':secRem>=8?'Active ✓':'Expired'; ze.className=inZone?'green':'dim';
    const wpe2=e('wd-wp'); if(wpe2){wpe2.textContent=wdA>0?(wdWP*100).toFixed(1)+'%':'—';wpe2.className=wdWP>.6?'green':'';}
    const ee2=e('wd-edge'); if(ee2){ee2.textContent=wdEdge>0?'+'+(wdEdge*100).toFixed(1)+'%':'—';ee2.className=wdEdge>.04?'green':'';}

    // dump hedge
    const dhS=(a.ask_up||0)+(a.ask_down||0), dhA=dhS>0&&dhS<.98, dhPr=dhS>0?((1/dhS)-1)*100:0;
    const dhEl=e('dh-sum'); if(dhEl){dhEl.textContent=dhS>0?'$'+dhS.toFixed(4):'—';dhEl.className='lagval '+(dhA?'green':'dim');}
    const dhB=e('dh-bar'); if(dhB){dhB.style.width=dhS>0?Math.min(100,dhS/1.05*100)+'%':'100%';dhB.style.background=dhA?'var(--green)':'var(--red)';}
    setStatus('dh-st-'+sym,dhA?'ARB ACTIVE':'INACTIVE',dhA?'arb':'waiting');
    e('dh-up').textContent  = a.ask_up>0?'$'+a.ask_up.toFixed(4):'—';
    e('dh-dn').textContent  = a.ask_down>0?'$'+a.ask_down.toFixed(4):'—';
    const ds2=e('dh-sum2'); if(ds2){ds2.textContent=dhS>0?'$'+dhS.toFixed(4):'—';ds2.className=dhA?'green':'';}
    const dp=e('dh-pr'); if(dp){dp.textContent=dhA?'+'+dhPr.toFixed(2)+'%':'—';dp.className=dhA?'green':'dim';}

    // open trades
    const oc=e('oc'); if(oc) oc.textContent=a.open_trades?a.open_trades.length:0;
    const tbo=e('tb-open'); if(tbo){
      if(a.open_trades&&a.open_trades.length>0){
        tbo.innerHTML=a.open_trades.map(t=>`<tr>
          <td class="dim">${t.id.slice(-8)}</td>
          <td><span class="bs bs-${t.strategy}">${t.strategy}</span></td>
          <td class="${dirCls(t.direction)}">${t.direction.toUpperCase()}</td>
          <td>$${t.token_price.toFixed(3)}</td><td>$${t.usdc_staked.toFixed(2)}</td>
          <td class="dim">${elapsed(t.timestamp)}</td><td class="dim">${tstr(t.window_end)}</td>
        </tr>`).join('');
      } else {
        tbo.innerHTML='<tr><td colspan="7" class="dim" style="text-align:center;padding:10px">Aucun trade ouvert</td></tr>';
      }
    }

    // history per asset
    const hc=e('hc'); if(hc) hc.textContent=a.recent_trades?a.recent_trades.length:0;
    const tbh=e('tb-hist'); if(tbh){
      if(a.recent_trades&&a.recent_trades.length>0){
        tbh.innerHTML=a.recent_trades.map(t=>{
          const pc=t.pnl>0?'pp':t.pnl<0?'pn':'pz';
          return `<tr>
            <td><span class="bs bs-${t.strategy}">${t.strategy}</span></td>
            <td class="${dirCls(t.direction)}">${t.direction.toUpperCase()}</td>
            <td>$${t.token_price.toFixed(3)}</td><td>$${t.usdc_staked.toFixed(2)}</td>
            <td class="${pc}">${fmtUSD(t.pnl)}</td>
            <td class="dim">${dtstr(t.timestamp)}</td><td class="dim">${tstr(t.window_end)}</td>
          </tr>`;
        }).join('');
      } else {
        tbh.innerHTML='<tr><td colspan="7" class="dim" style="text-align:center;padding:10px">Aucun trade resolu</td></tr>';
      }
    }
  });

  // overview table
  const ovTb=$('ov-tbody'); if(ovTb) ovTb.innerHTML=ovRows.join('');

  // global history (all assets merged, sorted newest first)
  histAllRows.sort((a,b)=>b.ts-a.ts);
  const ovHc=$('ov-hist-count'); if(ovHc) ovHc.textContent=histAllRows.length;
  const ovHt=$('ov-hist-tbody'); if(ovHt){
    if(histAllRows.length>0) ovHt.innerHTML=histAllRows.map(r=>r.html).join('');
    else ovHt.innerHTML='<tr><td colspan="8" class="dim" style="text-align:center;padding:10px">Aucun trade resolu</td></tr>';
  }
}

// ─── websocket ────────────────────────────────────────────────────────────────
let ws=null, rdelay=1000;
function connect(){
  const proto=location.protocol==='https:'?'wss:':'ws:';
  ws=new WebSocket(proto+'//'+location.host+'/ws');
  ws.onopen=()=>{$('ws-dot').className='dot connected';$('ws-label').textContent='Connected';rdelay=1000;};
  ws.onmessage=e=>{try{applyUpdate(JSON.parse(e.data));}catch(err){console.warn('ws:',err);}};
  ws.onclose=ws.onerror=()=>{
    $('ws-dot').className='dot';
    $('ws-label').textContent='Reconnecting in '+(rdelay/1000)+'s…';
    setTimeout(connect,rdelay); rdelay=Math.min(30000,rdelay*2);
  };
}

buildPanels();
initCharts();
connect();
</script>
